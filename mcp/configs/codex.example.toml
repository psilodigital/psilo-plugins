# Codex MCP configuration (example)
# Do not commit real secrets. Values are read from environment variables.

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_TOKEN = "${GITHUB_TOKEN}" }

[mcp_servers.gmail]
command = "npx"
args = ["-y", "@example/mcp-gmail"]
env = { GMAIL_CLIENT_ID = "${GMAIL_CLIENT_ID}", GMAIL_CLIENT_SECRET = "${GMAIL_CLIENT_SECRET}" }

[mcp_servers.google-drive]
command = "npx"
args = ["-y", "@example/mcp-google-drive"]
env = { GMAIL_CLIENT_ID = "${GMAIL_CLIENT_ID}", GMAIL_CLIENT_SECRET = "${GMAIL_CLIENT_SECRET}" }

[mcp_servers.slack]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-slack"]
env = { SLACK_BOT_TOKEN = "${SLACK_BOT_TOKEN}" }

[mcp_servers.psilobooking]
command = "node"
args = ["./mcp/servers/psilobooking-server.js"]
env = { PSILOBOOKING_API_URL = "${PSILOBOOKING_API_URL}", PSILOBOOKING_API_KEY = "${PSILOBOOKING_API_KEY}" }
